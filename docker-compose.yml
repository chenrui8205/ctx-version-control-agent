services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ctxvcs
      POSTGRES_PASSWORD: ctxvcs
      POSTGRES_DB: ctxvcs
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctxvcs"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  pgdata:
